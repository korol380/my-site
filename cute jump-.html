<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Мультяшный Раннер: Полная Версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Интерфейс игры */
        #ui {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }
        .instructions {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .scoreboard {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 320px;
            border-bottom: 5px solid #ccc;
        }
        #biome-name {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            font-weight: bold;
            margin-bottom: 4px;
        }
        #score-val {
            font-size: 36px;
            font-weight: 900;
            color: #222;
        }
        #next-change {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        /* Экран Смерти */
        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #game-over.visible {
            display: flex;
            opacity: 1;
        }
        .go-card {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            padding: 40px 60px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid #fff;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #game-over.visible .go-card {
            transform: scale(1);
        }
        .go-card h1 {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ff4757;
            text-shadow: 2px 2px 0px #fff;
        }
        .go-card p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #f1f2f6;
        }
        .restart-btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #26af5f;
            transition: all 0.1s ease;
        }
        .restart-btn:hover {
            background: #26af5f;
        }
        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #26af5f;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="instructions">ПРОБЕЛ или НАЖАТИЕ ЭКРАНА — Прыжок</div>
        <div class="scoreboard">
            <div id="biome-name">Загрузка...</div>
            <div id="score-val">0</div>
            <div id="next-change">Смена биома через: -- очков</div>
        </div>
    </div>

    <div id="game-over">
        <div class="go-card">
            <h1>БАСКЕТ! КРАШ!</h1>
            <p id="final-score">Вы набрали: 0 очков</p>
            <button class="restart-btn" onclick="Game.reset()">Бежать Снова</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

    <script>
        if (typeof THREE === 'undefined') {
            alert("Не удалось загрузить 3D движок. Проверьте интернет-соединение или обновите страницу.");
        }

        // --- ГЛОБАЛЬНЫЙ ОБЪЕКТ ИГРЫ ---
        const Game = {
            // Конфигурация 10 уникальных биомов
            biomes: [
                { name: "грибное безумие", sky: 0x7bf1a8, ground: 0x20bf6b, fog: 0x7bf1a8, objType: "mushroom", color1: 0xeb3b5a, color2: 0xffffff },
                { name: "неоновые цветы", sky: 0xa55eea, ground: 0x4b145c, fog: 0xa55eea, objType: "flower", color1: 0xfd9644, color2: 0x2bcbba },
                { name: "земли сладости", sky: 0xff9ff3, ground: 0xff007f, fog: 0xff9ff3, objType: "candy", color1: 0x00d2d3, color2: 0xffffff },
                { name: "Золотой кактус", sky: 0xfed330, ground: 0xfa8231, fog: 0xfed330, objType: "cactus", color1: 0x26de81, color2: 0xffd1dc },
                { name: "Пальмовый Рай", sky: 0x2bcbba, ground: 0x0fb9b1, fog: 0x2bcbba, objType: "palm", color1: 0xfffa65, color2: 0x78e08f },
                { name: "Кристальная Пещера", sky: 0x4b7bec, ground: 0x3867d6, fog: 0x4b7bec, objType: "crystal", color1: 0xff5252, color2: 0x34e7e4 },
                { name: "Облачный Мир", sky: 0xdff9fb, ground: 0xc7ecee, fog: 0xdff9fb, objType: "cloud", color1: 0xffffff, color2: 0xfffa65 },
                { name: "Бамбуковый Дзен", sky: 0x78e08f, ground: 0x3c6382, fog: 0x78e08f, objType: "bamboo", color1: 0x079992, color2: 0xf8c291 },
                { name: "лавовое изобилие", sky: 0xff7f50, ground: 0x2f3542, fog: 0xff7f50, objType: "lava_flower", color1: 0xff4757, color2: 0xffa502 },
                { name: "космо-грибы", sky: 0x0c2461, ground: 0x1e3799, fog: 0x0c2461, objType: "space_mushroom", color1: 0x1dd1a1, color2: 0xfeca57 }
            ],
            
            currentBiome: 0,
            score: 0,
            speed: 0.2,
            maxSpeed: 0.45,
            isGameOver: false,
            
            // Настройки рандомных лимитов очков
            scoreAtBiomeStart: 0,
            pointsToNextBiome: 0,
            
            obstacles: [],
            scenery: [],
            particles: null,
            
            init() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(-8, 5, 11);
                this.camera.lookAt(4, 2, 0);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.container.appendChild(this.renderer.domElement);
                
                this.setupLighting();
                this.createTrack();
                this.createPlayer();
                this.createParticleSystem();
                
                // Инициализация случайного стартового биома и случайного порога очков
                this.currentBiome = Math.floor(Math.random() * this.biomes.length);
                this.calculateNextBiomeThreshold();
                this.updateBiomeVisuals();
                
                window.addEventListener('keydown', (e) => { if(e.code === 'Space') this.playerJump(); });
                window.addEventListener('touchstart', () => this.playerJump());
                window.addEventListener('mousedown', () => this.playerJump());
                window.addEventListener('resize', () => this.onWindowResize());
                
                this.spawnTimer = 0;
                this.sceneryTimer = 0;
                
                this.updateUI();
            },
            
            // Динамический расчет случайного порога очков от 100 до 1000
            calculateNextBiomeThreshold() {
                this.scoreAtBiomeStart = this.score;
                this.pointsToNextBiome = (Math.floor(Math.random() * 91) + 10) * 10; 
            },
            
            setupLighting() {
                this.ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                this.scene.add(this.ambientLight);
                
                this.dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                this.dirLight.position.set(5, 20, 10);
                this.dirLight.castShadow = true;
                this.dirLight.shadow.mapSize.width = 1024;
                this.dirLight.shadow.mapSize.height = 1024;
                this.scene.add(this.dirLight);
            },
            
            createTrack() {
                const geometry = new THREE.BoxGeometry(200, 2, 6);
                this.trackMaterial = new THREE.MeshStandardMaterial({ roughness: 0.8 });
                this.track = new THREE.Mesh(geometry, this.trackMaterial);
                this.track.position.set(0, -1, 0);
                this.track.receiveShadow = true;
                this.scene.add(this.track);
            },
            
            createPlayer() {
                this.playerGroup = new THREE.Group();
                
                const bodyGeo = new THREE.BoxGeometry(1, 1.2, 1);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff5e57, roughness: 0.2 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.castShadow = true;
                body.position.y = 0.6;
                this.playerGroup.add(body);
                
                const eyeGeo = new THREE.BoxGeometry(0.2, 0.3, 0.2);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(0.51, 0.8, 0.25);
                const pupL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.1), pupilMat); pupL.position.set(0.6, 0.8, 0.25);
                
                const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.51, 0.8, -0.25);
                const pupR = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.1), pupilMat); pupR.position.set(0.6, 0.8, -0.25);
                
                this.playerGroup.add(eyeL, pupL, eyeR, pupR);
                this.playerGroup.position.set(0, 0, 0);
                this.scene.add(this.playerGroup);
                
                this.playerData = {
                    y: 0,
                    vy: 0,
                    isJumping: false,
                    gravity: -0.015,
                    jumpForce: 0.35
                };
            },
            
            createParticleSystem() {
                const count = 50;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                
                for(let i=0; i<count*3; i+=3) {
                    positions[i] = Math.random() * 40 - 10;
                    positions[i+1] = Math.random() * 10;
                    positions[i+2] = Math.random() * 10 - 5;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                this.particleMaterial = new THREE.PointsMaterial({ size: 0.3, transparent: true, opacity: 0.6 });
                this.particles = new THREE.Points(geometry, this.particleMaterial);
                this.scene.add(this.particles);
            },
            
            createModel(type, c1, c2) {
                const group = new THREE.Group();
                
                if (type === "mushroom" || type === "space_mushroom") {
                    const stemGeo = new THREE.CylinderGeometry(0.2, 0.3, 1, 8);
                    const stemMat = new THREE.MeshStandardMaterial({ color: 0xf5f6fa });
                    const stem = new THREE.Mesh(stemGeo, stemMat);
                    stem.position.y = 0.5;
                    stem.castShadow = true;
                    group.add(stem);
                    
                    const capGeo = new THREE.SphereGeometry(0.7, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
                    const capMat = new THREE.MeshStandardMaterial({ color: c1, roughness: 0.3 });
                    const cap = new THREE.Mesh(capGeo, capMat);
                    cap.position.y = 0.9;
                    cap.scale.set(1, 0.8, 1);
                    cap.castShadow = true;
                    group.add(cap);
                } 
                else if (type === "flower" || type === "lava_flower") {
                    const stemGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
                    const stemMat = new THREE.MeshStandardMaterial({ color: 0x4cd137 });
                    const stem = new THREE.Mesh(stemGeo, stemMat);
                    stem.position.y = 0.4;
                    group.add(stem);
                    
                    const budGeo = new THREE.TorusGeometry(0.4, 0.2, 8, 12);
                    const budMat = new THREE.MeshStandardMaterial({ color: c1 });
                    const bud = new THREE.Mesh(budGeo, budMat);
                    bud.position.y = 0.9;
                    bud.rotation.x = Math.PI / 2;
                    group.add(bud);
                    
                    const coreGeo = new THREE.SphereGeometry(0.25, 8, 8);
                    const coreMat = new THREE.MeshStandardMaterial({ color: c2 });
                    const core = new THREE.Mesh(coreGeo, coreMat);
                    core.position.y = 0.9;
                    group.add(core);
                } 
                else if (type === "candy") {
                    const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.2), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    stick.position.y = 0.6;
                    group.add(stick);
                    
                    const candyGeo = new THREE.SphereGeometry(0.5, 12, 12);
                    const candyMat = new THREE.MeshStandardMaterial({ color: c1, roughness: 0.1 });
                    const candy = new THREE.Mesh(candyGeo, candyMat);
                    candy.position.y = 1.2;
                    group.add(candy);
                }
                else if (type === "cactus") {
                    const mat = new THREE.MeshStandardMaterial({ color: c1, roughness: 0.9 });
                    const main = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 1.5, 8), mat);
                    main.position.y = 0.75;
                    group.add(main);
                    
                    const branch = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.2), mat);
                    branch.position.set(0.3, 0.9, 0);
                    group.add(branch);
                }
                else if (type === "palm") {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 2, 8), new THREE.MeshStandardMaterial({ color: 0xcd84f1 }));
                    trunk.position.y = 1;
                    group.add(trunk);
                    
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.9, 0.8, 5), new THREE.MeshStandardMaterial({ color: c1 }));
                    leaves.position.y = 2;
                    group.add(leaves);
                }
                else if (type === "crystal") {
                    const cryGeo = new THREE.OctahedronGeometry(0.6, 0);
                    const cryMat = new THREE.MeshStandardMaterial({ color: c1, roughness: 0.1, metalness: 0.5 });
                    const crystal = new THREE.Mesh(cryGeo, cryMat);
                    crystal.position.y = 0.6;
                    crystal.scale.set(0.7, 1.3, 0.7);
                    group.add(crystal);
                }
                else {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
                    trunk.position.y = 0.5;
                    group.add(trunk);
                    const top = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), new THREE.MeshStandardMaterial({ color: c1 }));
                    top.position.y = 1.1;
                    group.add(top);
                }
                
                return group;
            },
            
            updateBiomeVisuals() {
                const b = this.biomes[this.currentBiome];
                
                this.scene.background = new THREE.Color(b.sky);
                this.scene.fog = new THREE.FogExp2(b.fog, 0.04);
                this.trackMaterial.color.setHex(b.ground);
                this.particleMaterial.color.setHex(b.color1);
                
                document.getElementById('biome-name').innerText = `Биом: ${b.name}`;
                this.updateUI();
            },
            
            playerJump() {
                if(!this.playerData.isJumping && !this.isGameOver) {
                    this.playerData.isJumping = true;
                    this.playerData.vy = this.playerData.jumpForce;
                }
            },
            
            spawnObstacle() {
                const b = this.biomes[this.currentBiome];
                const model = this.createModel(b.objType, b.color1, b.color2);
                model.position.set(30, 0, 0);
                this.scene.add(model);
                this.obstacles.push(model);
            },
            
            spawnScenery() {
                const b = this.biomes[this.currentBiome];
                const model = this.createModel(b.objType, b.color2, b.color1);
                model.position.set(30, 0, -2.5 - Math.random() * 2);
                model.scale.set(0.8, 0.8 + Math.random()*0.5, 0.8);
                this.scene.add(model);
                this.scenery.push(model);
            },
            
            updateUI() {
                document.getElementById('score-val').innerText = this.score;
                
                let currentProgress = this.score - this.scoreAtBiomeStart;
                let remaining = this.pointsToNextBiome - currentProgress;
                document.getElementById('next-change').innerText = `Смена биома через: ${Math.max(0, remaining)} очков`;
            },
            
            tick() {
                if (this.isGameOver) return;
                
                const p = this.playerData;
                if(p.isJumping) {
                    p.y += p.vy;
                    p.vy += p.gravity;
                    
                    if(p.y <= 0) {
                        p.y = 0;
                        p.vy = 0;
                        p.isJumping = false;
                    }
                }
                this.playerGroup.position.y = p.y;
                
                if (!p.isJumping) {
                    this.playerGroup.rotation.z = Math.sin(Date.now() * 0.015) * 0.1;
                    this.playerGroup.scale.y = 1 + Math.sin(Date.now() * 0.03) * 0.05;
                } else {
                    this.playerGroup.rotation.z = -0.15;
                    this.playerGroup.scale.y = 1;
                }
                
                this.speed = Math.min(this.maxSpeed, 0.18 + (this.score * 0.0002));
                
                this.spawnTimer += 1;
                if(this.spawnTimer > Math.max(45, 90 - (this.speed * 120))) {
                    this.spawnTimer = 0;
                    if(Math.random() > 0.3) this.spawnObstacle();
                }
                
                this.sceneryTimer += 1;
                if(this.sceneryTimer > 30) {
                    this.sceneryTimer = 0;
                    this.spawnScenery();
                }
                
                for(let i = this.scenery.length - 1; i >= 0; i--) {
                    this.scenery[i].position.x -= this.speed;
                    if(this.scenery[i].position.x < -10) {
                        this.scene.remove(this.scenery[i]);
                        this.scenery.splice(i, 1);
                    }
                }
                
                for(let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.position.x -= this.speed;
                    obs.rotation.y += 0.01;
                    
                    const diffX = Math.abs(this.playerGroup.position.x - obs.position.x);
                    const diffY = this.playerGroup.position.y; 
                    
                    if (diffX < 0.85 && diffY < 1.1) {
                        this.gameOver();
                        return;
                    }
                    
                    if(obs.position.x < -6) {
                        this.scene.remove(obs);
                        this.obstacles.splice(i, 1);
                        this.score += 10;
                        this.updateUI();
                        
                        // Логика случайного порога очков для смены биомов
                        let currentProgress = this.score - this.scoreAtBiomeStart;
                        if(currentProgress >= this.pointsToNextBiome) {
                            let nextBiome;
                            do {
                                nextBiome = Math.floor(Math.random() * this.biomes.length);
                            } while (nextBiome === this.currentBiome);
                            
                            this.currentBiome = nextBiome;
                            this.calculateNextBiomeThreshold(); 
                            this.updateBiomeVisuals();
                        }
                    }
                }
                
                if(this.particles) {
                    const pos = this.particles.geometry.attributes.position.array;
                    for(let i=0; i<pos.length; i+=3) {
                        pos[i] -= this.speed * 0.5;
                        if(pos[i] < -10) {
                            pos[i] = 30;
                            pos[i+1] = Math.random() * 10;
                        }
                    }
                    this.particles.geometry.attributes.position.needsUpdate = true;
                }
            },
            
            gameOver() {
                this.isGameOver = true;
                document.getElementById('final-score').innerText = `Вы набрали: ${this.score} очков`;
                document.getElementById('game-over').classList.add('visible');
            },
            
            reset() {
                this.obstacles.forEach(o => this.scene.remove(o));
                this.scenery.forEach(s => this.scene.remove(s));
                
                this.obstacles = [];
                this.scenery = [];
                this.score = 0;
                
                this.currentBiome = Math.floor(Math.random() * this.biomes.length);
                this.calculateNextBiomeThreshold();
                
                this.speed = 0.2;
                this.isGameOver = false;
                this.spawnTimer = 0;
                this.sceneryTimer = 0;
                
                this.playerData.y = 0;
                this.playerData.vy = 0;
                this.playerData.isJumping = false;
                this.playerGroup.position.set(0, 0, 0);
                
                this.updateBiomeVisuals();
                this.updateUI();
                
                document.getElementById('game-over').classList.remove('visible');
            },
            
            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };

        window.onload = () => {
            Game.init();
            
            function renderLoop() {
                requestAnimationFrame(renderLoop);
                Game.tick();
                Game.renderer.render(Game.scene, Game.camera);
            }
            renderLoop();
        };
    </script>
</body>
</html>
