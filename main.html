<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1a2e;
    --border: #2a2a4a;
    --text: #fffffe;
    --sub: #a7a9be;
    --c1: #ff6b6b;
    --c2: #ffd93d;
    --c3: #6bcb77;
    --c4: #4d96ff;
    --c5: #ff922b;
    --c6: #cc5de8;
    --c7: #20c997;
    --cell-size: 44px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 16px;
    overflow-x: hidden;
    background-image: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #0a1a2e 0%, transparent 60%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-shadow: none;
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .top-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 420px;
    justify-content: center;
  }

  .score-box {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 10px 24px;
    text-align: center;
    flex: 1;
  }

  .score-box .label {
    font-size: 0.7rem;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .score-box .value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--text);
    line-height: 1;
  }

  #score-display { color: #ffd93d; }
  #best-display { color: #6bcb77; }

  .grid-wrap {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 10px;
    box-shadow: 0 0 40px rgba(77, 150, 255, 0.1), inset 0 0 20px rgba(0,0,0,0.3);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(8, var(--cell-size));
    grid-template-rows: repeat(8, var(--cell-size));
    gap: 3px;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 8px;
    background: #16213e;
    border: 1.5px solid #1e2d50;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .cell.filled {
    border-color: transparent;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 2px 6px rgba(0,0,0,0.4);
  }

  .cell.filled::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px;
    height: 35%;
    background: rgba(255,255,255,0.18);
    border-radius: 4px;
  }

  .cell.highlight {
    background: rgba(255,255,255,0.12) !important;
    border-color: rgba(255,255,255,0.3) !important;
    transform: scale(1.05);
  }

  .cell.highlight-bad {
    background: rgba(255,80,80,0.25) !important;
    border-color: rgba(255,80,80,0.5) !important;
  }

  .cell.pop {
    animation: popCell 0.35s ease forwards;
  }

  @keyframes popCell {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  .tray {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 16px;
    width: 100%;
    max-width: 420px;
  }

  .piece-slot {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: grab;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .piece-slot:active { cursor: grabbing; }

  .piece-slot.active-slot {
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }

  .piece-canvas {
    display: grid;
    gap: 2px;
    pointer-events: none;
  }

  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    display: none;
    transform: translate(-50%, -130%);
    transition: none;
  }

  #drag-ghost .piece-canvas {
    opacity: 0.85;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6));
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .overlay.show { display: flex; }

  .overlay-box {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
  }

  .overlay-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--c1);
    margin-bottom: 8px;
  }

  .overlay-box p {
    color: var(--sub);
    font-size: 1rem;
    margin-bottom: 4px;
  }

  .overlay-box .big-score {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: var(--c2);
    margin: 8px 0 24px;
  }

  .btn {
    background: linear-gradient(135deg, #4d96ff, #6bcb77);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, filter 0.15s;
    box-shadow: 0 4px 20px rgba(77,150,255,0.4);
  }

  .btn:hover { transform: scale(1.06); filter: brightness(1.1); }
  .btn:active { transform: scale(0.97); }

  .score-pop {
    position: fixed;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #ffd93d;
    pointer-events: none;
    z-index: 200;
    animation: scorePop 0.9s ease forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  @keyframes scorePop {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    60% { transform: translateY(-60px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  .combo-text {
    color: #cc5de8;
    font-size: 1.8rem;
    text-shadow: 0 0 20px #cc5de8;
  }

  @media (max-width: 480px) {
    :root { --cell-size: 38px; }
    h1 { font-size: 1.8rem; }
  }

  @media (max-width: 380px) {
    :root { --cell-size: 32px; }
  }
</style>
</head>
<body>

<h1>BLOCK DESTROYER</h1>

<div class="top-bar">
  <div class="score-box">
    <div class="label">Счёт</div>
    <div class="value" id="score-display">0</div>
  </div>
  <div class="score-box">
    <div class="label">Рекорд</div>
    <div class="value" id="best-display">0</div>
  </div>
</div>

<div class="grid-wrap">
  <div id="grid"></div>
</div>

<div class="tray" id="tray"></div>

<div id="drag-ghost">
  <div class="piece-canvas" id="ghost-canvas"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2>Игра окончена!</h2>
    <p>Твой счёт</p>
    <div class="big-score" id="final-score">0</div>
    <button class="btn" onclick="restartGame()">Играть снова</button>
  </div>
</div>

<script>
const ROWS = 8, COLS = 8;
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595'];

const PIECES = [
  { shape: [[1]], name: '1x1' },
  { shape: [[1,1]], name: '1x2' },
  { shape: [[1,1,1]], name: '1x3' },
  { shape: [[1,1,1,1]], name: '1x4' },
  { shape: [[1],[1]], name: '2x1' },
  { shape: [[1],[1],[1]], name: '3x1' },
  { shape: [[1],[1],[1],[1]], name: '4x1' },
  { shape: [[1,1],[1,1]], name: '2x2' },
  { shape: [[1,1,1],[1,1,1]], name: '2x3' },
  { shape: [[1,1,1],[0,0,1]], name: 'L' },
  { shape: [[1,1,1],[1,0,0]], name: 'J' },
  { shape: [[0,1],[1,1],[1,0]], name: 'S' },
  { shape: [[1,0],[1,1],[0,1]], name: 'Z' },
  { shape: [[0,1,0],[1,1,1]], name: 'T' },
  { shape: [[1,0],[1,0],[1,1]], name: 'L2' },
  { shape: [[0,1],[0,1],[1,1]], name: 'J2' },
  { shape: [[1,1,1],[0,1,0]], name: 'T2' },
  { shape: [[1,1],[1,0],[1,0]], name: 'L3' },
  { shape: [[1,1],[0,1],[0,1]], name: 'J3' },
  { shape: [[1,1,1],[1,0,0],[1,0,0]], name: 'corner' },
];

let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem('bb_best') || '0');
let dragPiece = null;
let dragPos = { x: 0, y: 0 };
let slots = [null, null, null];
let cellEls = [];

function initGrid() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  cellEls = [];
  for (let r = 0; r < ROWS; r++) {
    cellEls[r] = [];
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
      cellEls[r][c] = cell;
    }
  }
}

function renderGrid() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = cellEls[r][c];
      const color = grid[r][c];
      el.classList.remove('pop');
      if (color) {
        el.classList.add('filled');
        el.classList.remove('highlight', 'highlight-bad');
        el.style.background = color;
        el.style.borderColor = 'transparent';
      } else {
        el.classList.remove('filled', 'highlight', 'highlight-bad');
        el.style.background = '#16213e';
        el.style.borderColor = '#1e2d50';
      }
    }
  }
}

function randPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  return { shape: p.shape, color };
}

function getPieceCells(shape, originR, originC) {
  const cells = [];
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) cells.push({ r: originR + r, c: originC + c });
  return cells;
}

function canPlace(cells) {
  return cells.every(({ r, c }) => r >= 0 && r < ROWS && c >= 0 && c < COLS && !grid[r][c]);
}

function pieceHasMove(piece) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (canPlace(getPieceCells(piece.shape, r, c))) return true;
  return false;
}

function spawnSlots() {
  const newSlots = [];
  for (let i = 0; i < 3; i++) {
    let piece;
    let attempts = 0;
    do {
      piece = randPiece();
      attempts++;
    } while (!pieceHasMove(piece) && attempts < 50);
    newSlots.push(piece);
  }
  slots = newSlots;
  renderTray();
}

function renderTray() {
  const tray = document.getElementById('tray');
  tray.innerHTML = '';
  slots.forEach((piece, idx) => {
    const slot = document.createElement('div');
    slot.className = 'piece-slot';
    slot.dataset.idx = idx;
    if (piece) {
      const canvas = buildPieceCanvas(piece, 14);
      slot.appendChild(canvas);
      slot.addEventListener('mousedown', e => startDrag(e, idx, slot));
      slot.addEventListener('touchstart', e => startDrag(e, idx, slot), { passive: false });
    }
    tray.appendChild(slot);
  });
}

function buildPieceCanvas(piece, cellPx) {
  const canvas = document.createElement('div');
  canvas.className = 'piece-canvas';
  const rows = piece.shape.length;
  const cols = piece.shape[0].length;
  canvas.style.gridTemplateColumns = `repeat(${cols}, ${cellPx}px)`;
  canvas.style.gridTemplateRows = `repeat(${rows}, ${cellPx}px)`;
  piece.shape.forEach(row => {
    row.forEach(v => {
      const c = document.createElement('div');
      c.style.width = cellPx + 'px';
      c.style.height = cellPx + 'px';
      c.style.borderRadius = '3px';
      if (v) {
        c.style.background = piece.color;
        c.style.boxShadow = 'inset 0 2px 0 rgba(255,255,255,0.25)';
      }
      canvas.appendChild(c);
    });
  });
  return canvas;
}

function startDrag(e, idx, slotEl) {
  if (!slots[idx]) return;
  e.preventDefault();
  dragPiece = { slotIdx: idx, piece: slots[idx] };
  slotEl.classList.add('active-slot');

  const ghost = document.getElementById('drag-ghost');
  const ghostCanvas = document.getElementById('ghost-canvas');
  ghostCanvas.innerHTML = '';
  const cellPx = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));
  ghostCanvas.appendChild(buildPieceCanvas(dragPiece.piece, cellPx - 4));
  ghost.style.display = 'block';

  const pt = getPoint(e);
  dragPos = pt;
  moveGhost(pt.x, pt.y);

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
}

function getPoint(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function moveGhost(x, y) {
  const ghost = document.getElementById('drag-ghost');
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';
}

function onDragMove(e) {
  e.preventDefault();
  const pt = getPoint(e);
  dragPos = pt;
  moveGhost(pt.x, pt.y);
  showPreview(pt.x, pt.y);
}

function onDragEnd(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);

  document.getElementById('drag-ghost').style.display = 'none';
  clearHighlight();

  if (dragPiece) {
    const gridCoords = getGridCoords(dragPos.x, dragPos.y);
    if (gridCoords) {
      const { r, c } = gridCoords;
      const cells = getPieceCells(dragPiece.piece.shape, r, c);
      if (cells && canPlace(cells)) {
        placePiece(cells, dragPiece.piece.color, dragPiece.slotIdx);
      }
    }
  }

  document.querySelectorAll('.piece-slot').forEach(s => s.classList.remove('active-slot'));
  dragPiece = null;
}

function getGridCoords(clientX, clientY) {
  const gridEl = document.getElementById('grid');
  const rect = gridEl.getBoundingClientRect();
  const cellPx = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));
  const step = cellPx + 3;
  const shape = dragPiece.piece.shape;
  const offsetX = clientX - rect.left - (shape[0].length * step) / 2;
  const offsetY = clientY - rect.top - (shape.length * step) / 2 - step * 1.2;
  return { r: Math.round(offsetY / step), c: Math.round(offsetX / step) };
}

function showPreview(clientX, clientY) {
  clearHighlight();
  if (!dragPiece) return;
  const coords = getGridCoords(clientX, clientY);
  if (!coords) return;
  const cells = getPieceCells(dragPiece.piece.shape, coords.r, coords.c);
  const ok = canPlace(cells);
  cells.forEach(({ r, c }) => {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS)
      cellEls[r][c].classList.add(ok ? 'highlight' : 'highlight-bad');
  });
}

function clearHighlight() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      cellEls[r][c].classList.remove('highlight', 'highlight-bad');
}

function placePiece(cells, color, slotIdx) {
  cells.forEach(({ r, c }) => {
    grid[r][c] = color;
    cellEls[r][c].classList.add('filled');
    cellEls[r][c].style.background = color;
    cellEls[r][c].style.borderColor = 'transparent';
  });
  slots[slotIdx] = null;
  renderTray();
  setTimeout(() => {
    checkLines();
    if (slots.every(s => !s)) spawnSlots();
    if (isGameOver()) showGameOver();
  }, 50);
}

function checkLines() {
  const rowsToClear = [];
  const colsToClear = [];

  for (let r = 0; r < ROWS; r++)
    if (grid[r].every(v => v)) rowsToClear.push(r);
  for (let c = 0; c < COLS; c++)
    if (grid.every(row => row[c])) colsToClear.push(c);

  if (!rowsToClear.length && !colsToClear.length) return;

  const toFlash = new Set();
  rowsToClear.forEach(r => { for (let c = 0; c < COLS; c++) toFlash.add(`${r}_${c}`); });
  colsToClear.forEach(c => { for (let r = 0; r < ROWS; r++) toFlash.add(`${r}_${c}`); });

  toFlash.forEach(key => {
    const [r, c] = key.split('_').map(Number);
    cellEls[r][c].classList.add('pop');
  });

  setTimeout(() => {
    rowsToClear.forEach(r => { for (let c = 0; c < COLS; c++) grid[r][c] = null; });
    colsToClear.forEach(c => { for (let r = 0; r < ROWS; r++) grid[r][c] = null; });

    toFlash.forEach(key => {
      const [r, c] = key.split('_').map(Number);
      const el = cellEls[r][c];
      el.classList.remove('pop', 'filled');
      el.style.background = '#16213e';
      el.style.borderColor = '#1e2d50';
    });

    renderGrid();
    const lines = rowsToClear.length + colsToClear.length;
    const pts = lines * 100 + (lines > 1 ? (lines - 1) * 50 : 0);
    addScore(pts, lines);
  }, 350);
}

function addScore(pts, lines) {
  score += pts;
  if (score > best) {
    best = score;
    localStorage.setItem('bb_best', best);
  }
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = best;

  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + pts;
  if (lines > 1) pop.classList.add('combo-text');
  const gridRect = document.getElementById('grid').getBoundingClientRect();
  pop.style.left = (gridRect.left + gridRect.width / 2 - 30) + 'px';
  pop.style.top = (gridRect.top + gridRect.height / 2) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

function isGameOver() {
  return slots.filter(Boolean).every(piece => {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (canPlace(getPieceCells(piece.shape, r, c))) return false;
    return true;
  });
}

function showGameOver() {
  document.getElementById('final-score').textContent = score;
  document.getElementById('overlay').classList.add('show');
}

function restartGame() {
  score = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  initGrid();
  spawnSlots();
}

initGrid();
document.getElementById('best-display').textContent = best;
spawnSlots();
</script>
</body>
</html>
